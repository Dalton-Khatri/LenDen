<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0A2E"/>
      <stop offset="100%" style="stop-color:#0D0D1A"/>
    </linearGradient>

    <!-- Purple glow gradient for circle -->
    <radialGradient id="circleGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#9D4EDD;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#7B2FBE;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#3D0066;stop-opacity:0.4"/>
    </radialGradient>

    <!-- Shine gradient on circle -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.0"/>
    </linearGradient>

    <!-- Arrow up gradient (green) -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676"/>
      <stop offset="100%" style="stop-color:#00BFA5"/>
    </linearGradient>

    <!-- Arrow down gradient (red) -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4569"/>
      <stop offset="100%" style="stop-color:#C2185B"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E0AAFF"/>
      <stop offset="100%" style="stop-color:#AA6FE0"/>
    </linearGradient>

    <!-- Outer glow filter -->
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft drop shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#7B2FBE" flood-opacity="0.5"/>
    </filter>

    <!-- Arrow glow -->
    <filter id="arrowGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <clipPath id="circleClip">
      <circle cx="256" cy="210" r="165"/>
    </clipPath>
  </defs>

  <!-- ── Background rounded square ── -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)"/>

  <!-- Subtle background orb top-right -->
  <circle cx="400" cy="80" r="140" fill="#7B2FBE" opacity="0.12"/>
  <!-- Subtle background orb bottom-left -->
  <circle cx="100" cy="430" r="120" fill="#3D0066" opacity="0.15"/>

  <!-- ── Glowing purple circle (icon body) ── -->
  <circle cx="256" cy="210" r="165" fill="url(#circleGrad)" filter="url(#softShadow)"/>

  <!-- Glass shine overlay -->
  <ellipse cx="210" cy="140" rx="100" ry="60" fill="url(#shineGrad)" clip-path="url(#circleClip)"/>

  <!-- Circle border -->
  <circle cx="256" cy="210" r="165" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>

  <!-- ── UP arrow (Len = gave/lend) — GREEN ── -->
  <!-- Arrow shaft -->
  <rect x="226" y="165" width="28" height="90" rx="10" fill="url(#greenGrad)" filter="url(#arrowGlow)" opacity="0.95"/>
  <!-- Arrow head -->
  <polygon points="256,108 206,172 306,172" fill="url(#greenGrad)" filter="url(#arrowGlow)" opacity="0.95"/>

  <!-- ── DOWN arrow (Den = receive/den) — RED ── -->
  <!-- Arrow shaft -->
  <rect x="258" y="195" width="28" height="90" rx="10" fill="url(#redGrad)" filter="url(#arrowGlow)" opacity="0.95"/>
  <!-- Arrow head -->
  <polygon points="272,318 222,252 322,252" fill="url(#redGrad)" filter="url(#arrowGlow)" opacity="0.95"/>

  <!-- Small connecting dot in center -->
  <circle cx="256" cy="210" r="10" fill="#ffffff" opacity="0.9"/>

  <!-- ── App Name: LenDen ── -->
  <text
    x="256"
    y="420"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="800"
    text-anchor="middle"
    fill="url(#textGrad)"
    letter-spacing="2"
  >LenDen</text>

  <!-- Subtle underline accent -->
  <rect x="156" y="432" width="200" height="3" rx="2" fill="url(#textGrad)" opacity="0.5"/>

  <!-- Tagline -->
  <text
    x="256"
    y="470"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="400"
    text-anchor="middle"
    fill="#AA6FE0"
    opacity="0.8"
    letter-spacing="3"
  >PAISA SAATHI</text>
</svg>
